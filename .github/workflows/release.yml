name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - goarch: amd64
            zig_target: x86_64-linux-gnu
          - goarch: arm64
            zig_target: aarch64-linux-gnu

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: mlugg/setup-zig@v2

      - name: Create zig CC wrapper
        run: |
          cat > /tmp/zigcc <<'EOF'
          #!/bin/sh
          exec zig cc -target ${{ matrix.zig_target }} "$@"
          EOF
          chmod +x /tmp/zigcc

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: /tmp/zigcc
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/nekocode-tui-linux-${GOARCH} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekocode-tui-linux-${{ matrix.goarch }}
          path: dist/nekocode-tui-linux-${{ matrix.goarch }}

  build-darwin:
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/nekocode-tui-darwin-${GOARCH} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekocode-tui-darwin-${{ matrix.goarch }}
          path: dist/nekocode-tui-darwin-${{ matrix.goarch }}

  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*/*
