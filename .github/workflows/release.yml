name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        goarch: [amd64, arm64]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/nekocode-linux-${GOARCH} ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekocode-linux-${{ matrix.goarch }}
          path: dist/nekocode-linux-${{ matrix.goarch }}

  build-darwin:
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/nekocode-darwin-${GOARCH} ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekocode-darwin-${{ matrix.goarch }}
          path: dist/nekocode-darwin-${{ matrix.goarch }}

  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*/*
