name: Go

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: mlugg/setup-zig@v2
      - name: Create zig CC wrapper
        run: |
          cat > /tmp/zigcc <<'EOF'
          #!/bin/sh
          exec zig cc -target native "$@"
          EOF
          chmod +x /tmp/zigcc
      - run: CC=/tmp/zigcc go build ./...
      - run: CC=/tmp/zigcc go test ./...
      - run: CC=/tmp/zigcc go vet ./...
