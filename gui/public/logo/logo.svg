<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主体背景渐变：暖紫到暖粉，贴合"软萌猫娘"气质 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CFC"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <!-- 猫脸渐变：深空蓝紫，带一点神秘感 -->
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B3561"/>
      <stop offset="1" stop-color="#241F3D"/>
    </linearGradient>
    <!-- 眼睛发光：青绿荧光，代表"AI 智能" -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7AF8D0"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </radialGradient>
    <!-- 耳朵内侧粉 -->
    <linearGradient id="earIn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBCFE8"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <!-- 外发光滤镜 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角正方形底板 -->
  <rect x="20" y="20" width="472" height="472" rx="112" ry="112" fill="url(#bg)"/>
  <!-- 底板柔光叠加，增加质感 -->
  <rect x="20" y="20" width="472" height="472" rx="112" ry="112" fill="#ffffff" opacity="0.08"/>

  <!-- 猫脸（居中偏下，给耳朵留空间） -->
  <g transform="translate(256,278)">
    <!-- 左耳 -->
    <path d="M -150 -90 L -118 -200 L -32 -120 Z" fill="url(#face)"/>
    <path d="M -132 -96 L -114 -168 L -58 -118 Z" fill="url(#earIn)"/>
    <!-- 右耳 -->
    <path d="M 150 -90 L 118 -200 L 32 -120 Z" fill="url(#face)"/>
    <path d="M 132 -96 L 114 -168 L 58 -118 Z" fill="url(#earIn)"/>

    <!-- 脸 -->
    <ellipse cx="0" cy="0" rx="168" ry="148" fill="url(#face)"/>

    <!-- 脸颊腮红（软萌关键） -->
    <ellipse cx="-105" cy="40" rx="34" ry="20" fill="#F472B6" opacity="0.35"/>
    <ellipse cx="105"  cy="40" rx="34" ry="20" fill="#F472B6" opacity="0.35"/>

    <!-- 眼睛：椭圆眼眶 + 发光瞳 + 高光 -->
    <g filter="url(#glow)">
      <ellipse cx="-65" cy="-22" rx="40" ry="46" fill="#0E0E1A"/>
      <ellipse cx="-65" cy="-22" rx="22" ry="34" fill="url(#eyeGlow)"/>
      <circle cx="-72" cy="-34" r="7" fill="#ffffff" opacity="0.9"/>
      <circle cx="-56" cy="-14" r="3" fill="#ffffff" opacity="0.6"/>
    </g>
    <g filter="url(#glow)">
      <ellipse cx="65" cy="-22" rx="40" ry="46" fill="#0E0E1A"/>
      <ellipse cx="65" cy="-22" rx="22" ry="34" fill="url(#eyeGlow)"/>
      <circle cx="58" cy="-34" r="7" fill="#ffffff" opacity="0.9"/>
      <circle cx="74" cy="-14" r="3" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- 鼻子（小三角） -->
    <path d="M -12 30 L 12 30 L 0 48 Z" fill="#FBCFE8"/>

    <!-- 嘴：w 形，带笑意 -->
    <path d="M -26 58 Q -10 74 0 58 Q 10 74 26 58" stroke="#FBCFE8" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- 胡须（左右各三根） -->
    <g stroke="#C7BFE0" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="-165" y1="18"  x2="-95"  y2="28"/>
      <line x1="-165" y1="40"  x2="-95"  y2="40"/>
      <line x1="-165" y1="62"  x2="-95"  y2="52"/>
      <line x1="165"  y1="18"  x2="95"   y2="28"/>
      <line x1="165"  y1="40"  x2="95"   y2="40"/>
      <line x1="165"  y1="62"  x2="95"   y2="52"/>
    </g>
  </g>

  <!-- 顶部代码符号：</> 代表"编程助手" -->
  <g transform="translate(256,96)" fill="#ffffff" opacity="0.92" filter="url(#glow)">
    <text x="0" y="0" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="70" font-weight="700" letter-spacing="2">&lt;/&gt;</text>
  </g>

  <!-- 底部品牌字 -->
  <g transform="translate(256,478)" fill="#ffffff">
    <text x="0" y="0" text-anchor="middle" font-family="ui-rounded, 'Hiragino Maru Gothic ProN', 'Segoe UI', sans-serif" font-size="40" font-weight="700" letter-spacing="6">NEKOCODE</text>
  </g>
</svg>
